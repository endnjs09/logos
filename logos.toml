[project]
name = "logos"
distribution = "logos-harness"
purpose = "gemini_pro_high_coding_agent_calibration"
design_version = "v12"
architecture = "complete_structure_incremental_implementation"

[paths]
compat_cli = "src/logos/cli"
packages = "packages"
logos_core = "packages/logos-core/src/logos_core"
logos_installer = "packages/logos-installer/src/logos_installer"
logos_gemini = "packages/logos-gemini/src"
logos_eval = "packages/logos-eval/src"
core_assets = "core"
targets = "targets"
plugins = "plugins"
schemas = "schemas"
rules = "core/rules"
workflows = "core/workflows"
roles = "core/roles"
prompts = "core/prompts"
guards = "core/guards"
host_profiles = "core/profiles"
benchmarks = "benchmarks"
runs = "runs"
reports = "reports"
docs = "docs"

[hosts]
default = "gemini-cli"
supported = ["gemini-cli", "codex-cli"]
baseline_conditions = [
  "gemini-baseline",
  "gemini-logos",
  "codex-baseline"
]

[modes]
default = "middle"
allowed = ["low", "middle", "high"]
user_selected_mode_required = true

[logging]
format = "jsonl"
run_dir_template = "runs/{timestamp}-{task_id}-{condition}"
comparison_report_dir = "reports/comp"

[architecture_layers]
runtime_packages = ["logos-core", "logos-installer", "logos-gemini", "logos-eval"]
logos_core = ["assets", "config", "context", "evaluation", "guards", "manifests", "prompt_assembly", "rules", "workflow"]
logos_installer = ["cli", "install", "uninstall", "doctor", "render", "session", "targets"]
logos_gemini = ["mode", "injection", "hooks", "guards", "runtime", "approval", "checkpoint", "mcp"]
logos_eval = ["baseline", "runner", "measurement", "scoring", "reports", "reproducibility"]
core_assets = ["roles", "rules", "workflows", "prompts", "guards", "profiles"]
target_assets = ["gemini-cli", "codex-cli"]
extension_assets = ["plugins"]
contracts = ["schemas", "benchmarks", "runs", "reports"]

[targets]
default = "gemini-cli"
manifest = ".logos-target/target.toml"
supported = ["gemini-cli", "codex-cli"]

[plugins]
enabled = false
manifest = ".logos-plugin/plugin.toml"
builtin_dir = "plugins/builtin"
external_dir = "plugins/external"
examples_dir = "plugins/examples"
load_order = ["builtin", "external"]

[safety]
block_high_risk_override = true
high_risk_domains = [
  "auth",
  "authorization",
  "billing",
  "payments",
  "data-deletion",
  "db-migration",
  "secrets",
  "production-deploy"
]
