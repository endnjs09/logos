[project]
name = "logos"
distribution = "logos-harness"
purpose = "gemini_pro_high_coding_agent_calibration"
design_version = "v12"
architecture = "complete_structure_incremental_implementation"

[paths]
source = "src/logos"
core_assets = "core"
plugins = "plugins"
schemas = "schemas"
rules = "core/rules"
workflows = "core/workflows"
roles = "core/roles"
prompts = "core/prompts"
guards = "core/guards"
host_profiles = "core/profiles"
benchmarks = "benchmarks"
runs = "runs"
reports = "reports"
docs = "docs"

[hosts]
default = "gemini"
supported = ["gemini", "codex", "claude-code"]
baseline_conditions = [
  "gemini-baseline",
  "gemini-logos",
  "codex-baseline",
  "claude-code-baseline"
]

[modes]
default = "middle"
allowed = ["low", "middle", "high"]
user_selected_mode_required = true

[logging]
format = "jsonl"
run_dir_template = "runs/{timestamp}-{task_id}-{condition}"
comparison_report_dir = "reports/comp"

[architecture_layers]
runtime = ["core", "config", "hosts", "orch", "workflow", "policies", "context", "scan", "prompts", "artifacts", "eval", "telemetry", "cli", "utils", "plugins"]
core_assets = ["roles", "rules", "workflows", "prompts", "guards", "profiles"]
extension_assets = ["plugins"]
contracts = ["schemas", "benchmarks", "runs", "reports"]

[plugins]
enabled = false
manifest = ".logos-plugin/plugin.toml"
builtin_dir = "plugins/builtin"
external_dir = "plugins/external"
examples_dir = "plugins/examples"
load_order = ["builtin", "external"]

[safety]
block_high_risk_override = true
high_risk_domains = [
  "auth",
  "authorization",
  "billing",
  "payments",
  "data-deletion",
  "db-migration",
  "secrets",
  "production-deploy"
]
