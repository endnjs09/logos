[target]
name = "gemini-cli"
kind = "primary"
description = "Primary Logos target for Gemini CLI and Gemini Pro High calibration."

[provides]
commands = "commands"
prompts = "prompts"
hooks = "hooks"
tools = "tools"
templates = "templates"
install = "install"

[target_support.commands]
status = "confirmed"
notes = "Official Gemini CLI docs define project commands in <project>/.gemini/commands/*.toml. Local smoke test still requires an installed Gemini CLI binary."

[target_support.plugin]
status = "assumed"
notes = "Gemini CLI plugin loading behavior is not yet confirmed."

[target_support.before_tool]
status = "assumed"
notes = "May require Logos wrapper or adapter emulation."

[target_support.after_tool]
status = "assumed"
notes = "May require Logos wrapper or adapter emulation."

[target_support.session_state]
status = "emulated"
notes = "Logos stores Nous Mode state in .logos/session/nous-state.json."
